name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Test
        run: go test -race -count=1 ./matrix/... ./nn/...
      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build-wasm:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build WASM
        run: |
          if [ -f "$(go env GOROOT)/lib/wasm/wasm_exec.js" ]; then
            cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" docs/wasm_exec.js
          else
            cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" docs/wasm_exec.js
          fi
          GOOS=js GOARCH=wasm go build -o docs/nngo.wasm ./cmd/wasm/
