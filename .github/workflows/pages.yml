name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Test
        run: go test -race -count=1 ./matrix/... ./nn/...

      - name: Build WASM
        run: |
          if [ -f "$(go env GOROOT)/lib/wasm/wasm_exec.js" ]; then
            cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" docs/wasm_exec.js
          else
            cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" docs/wasm_exec.js
          fi
          GOOS=js GOARCH=wasm go build -o docs/nngo.wasm ./cmd/wasm/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
